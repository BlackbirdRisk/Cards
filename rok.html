<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rok Gutnik · Blackbird Risk Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#B8963E;--ink:#06060E;--cream:#F2EEE6;}
html,body{min-height:100vh;background:var(--ink);font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;gap:28px;}
#aurora{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(90px);}
.orb1{width:700px;height:700px;top:-200px;right:-150px;background:radial-gradient(circle,rgba(46,109,164,.45) 0%,transparent 70%);animation:o1 20s ease-in-out infinite;}
.orb2{width:500px;height:500px;bottom:-150px;left:-100px;background:radial-gradient(circle,rgba(46,109,164,.35) 0%,transparent 70%);animation:o2 16s ease-in-out infinite;}
.orb3{width:380px;height:380px;top:40%;left:30%;background:radial-gradient(circle,rgba(184,150,62,.18) 0%,transparent 70%);animation:o3 24s ease-in-out infinite;}
@keyframes o1{0%,100%{transform:translate(0,0);}50%{transform:translate(-40px,30px);}}
@keyframes o2{0%,100%{transform:translate(0,0);}50%{transform:translate(30px,-40px);}}
@keyframes o3{0%,100%{transform:translate(0,0);}50%{transform:translate(20px,20px);}}
.card-wrap{position:relative;z-index:2;width:440px;height:270px;cursor:pointer;}
.face{position:absolute;inset:0;border-radius:5px;overflow:hidden;background:#06060E;border:1px solid rgba(184,150,62,.2);transition:opacity .4s ease,transform .4s ease;}
.face-front{opacity:1;transform:scale(1);pointer-events:auto;z-index:2;}
.face-back{opacity:0;transform:scale(.97);pointer-events:none;z-index:1;}
.card-wrap.flipped .face-front{opacity:0;transform:scale(.97);pointer-events:none;}
.card-wrap.flipped .face-back{opacity:1;transform:scale(1);pointer-events:auto;}
.face-front::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 140% 100% at 90% 10%,rgba(46,109,164,.32) 0%,transparent 55%),radial-gradient(ellipse 80% 80% at 0% 100%,rgba(184,150,62,.12) 0%,transparent 50%);pointer-events:none;}
.face-front::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(184,150,62,.7),transparent);}
.fc{position:relative;z-index:1;padding:28px 32px;height:100%;display:flex;flex-direction:column;justify-content:space-between;}
.ft{display:flex;align-items:center;justify-content:space-between;}
.fbrand{display:flex;align-items:center;gap:10px;}
.fm{font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--gold);font-weight:300;line-height:1;}
.fvl{width:1px;height:20px;background:rgba(184,150,62,.3);}
.fw{font-size:10px;letter-spacing:.12em;color:rgba(184,150,62,.7);text-transform:uppercase;line-height:1.6;font-weight:300;}
.floc{font-size:10px;color:rgba(242,238,230,.3);letter-spacing:.06em;font-weight:300;}
.fn{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:300;color:var(--cream);line-height:1.1;margin-bottom:5px;}
.fn em{color:var(--gold);font-style:italic;}
.ftitle{font-size:11px;color:rgba(184,150,62,.8);letter-spacing:.06em;font-weight:300;margin-bottom:2px;}
.fcomp{font-size:10px;color:rgba(242,238,230,.35);letter-spacing:.04em;font-weight:300;}
.fcontact{display:flex;flex-direction:column;gap:5px;}
.frow{display:flex;align-items:center;gap:7px;}
.ficon{font-size:11px;color:rgba(184,150,62,.55);min-width:14px;}
.fval{font-size:11px;color:rgba(242,238,230,.8);font-weight:300;}
.fhint{position:absolute;bottom:11px;right:14px;font-size:9px;letter-spacing:.10em;color:rgba(242,238,230,.18);font-weight:300;}
.face-back{background:#F5F2EC;}
.bc{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:14px;}
.bc img{display:block;width:100%;max-width:220px;height:auto;image-rendering:pixelated;}
.bfoot{font-size:9px;letter-spacing:.14em;color:rgba(10,10,20,.35);text-transform:uppercase;text-align:center;font-weight:300;}
.save-btn{position:relative;z-index:2;display:flex;align-items:center;gap:10px;padding:14px 36px;border:1px solid rgba(184,150,62,.4);border-radius:3px;background:rgba(184,150,62,.07);color:rgba(184,150,62,.85);font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:300;cursor:pointer;transition:background .2s;text-decoration:none;}
.save-btn:hover{background:rgba(184,150,62,.14);}
.footer{position:relative;z-index:2;font-size:9px;letter-spacing:.16em;color:rgba(242,238,230,.18);text-transform:uppercase;text-align:center;font-weight:300;}
@media(max-width:500px){.card-wrap{width:calc(100vw - 48px);height:auto;min-height:230px;}.fn{font-size:26px;}.fc{padding:22px 24px;}}
</style>
</head>
